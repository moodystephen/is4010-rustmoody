name: Week 10 - Ownership and borrowing

on:
  workflow_dispatch:
  push:
    paths:
      - 'week10/**'
      - '.github/workflows/week10.yml'
  pull_request:
    paths:
      - 'week10/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run tests
        run: cd week10 && cargo test --verbose
      - name: Check formatting
        run: cd week10 && cargo fmt --check
      - name: Run Clippy
        run: cd week10 && cargo clippy -- -D warnings
