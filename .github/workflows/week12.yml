name: Week 12 - Generics and traits

on:
  workflow_dispatch:
  push:
    paths:
      - 'week12/**'
      - '.github/workflows/week12.yml'
  pull_request:
    paths:
      - 'week12/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run tests
        run: cd week12 && cargo test --verbose
      - name: Check formatting
        run: cd week12 && cargo fmt --check
      - name: Run Clippy
        run: cd week12 && cargo clippy -- -D warnings
