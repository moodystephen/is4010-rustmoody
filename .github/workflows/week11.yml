name: Week 11 - Structs, enums, and modules

on:
  workflow_dispatch:
  push:
    paths:
      - 'week11/**'
      - '.github/workflows/week11.yml'
  pull_request:
    paths:
      - 'week11/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run tests
        run: cd week11 && cargo test --verbose
      - name: Check formatting
        run: cd week11 && cargo fmt --check
      - name: Run Clippy
        run: cd week11 && cargo clippy -- -D warnings
