name: Week 13 - Idiomatic Rust

on:
  workflow_dispatch:
  push:
    paths:
      - 'week13/**'
      - '.github/workflows/week13.yml'
  pull_request:
    paths:
      - 'week13/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run tests
        run: cd week13 && cargo test --verbose
      - name: Check formatting
        run: cd week13 && cargo fmt --check
      - name: Run Clippy
        run: cd week13 && cargo clippy -- -D warnings
